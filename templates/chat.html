{% extends "base.html" %} {% block content %}
{% if user_online %}

<span class="online-status">
🟢 Online
</span>

{% else %}

<span class="offline-status">
⚫ Offline
</span>

{% endif %}

<section class="chat-section">
    <div class="chat-container">
        <div class="chat-header">
            <a href="{{ url_for('chat.inbox') }}" class="back-link">← Inbox</a>

            <div>
                <strong>{{ other_user.full_name }}</strong>
                <span>{{ listing.title }}</span>
                <small id="onlineStatus" class="offline-dot">Offline</small>
            </div>
        </div>

        <div class="chat-box" id="chatBox">
            {% for msg in messages %}
            <div class="chat-message {% if msg.sender_id == current_user.id %}sent{% else %}received{% endif %}">
                <p>{{ msg.content }}</p>
                <span>{{ msg.created_at.strftime("%H:%M") }}</span>
            </div>
            {% endfor %}
        </div>

        <form class="chat-form" id="chatForm">
            <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" required>
            <button type="submit">Send</button>
        </form>
    </div>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
    const socket = io(window.location.origin, {
        transports: ["websocket", "polling"]
    });

    const room = "{{ room }}";
    const currentUserId = {{ current_user.id }};
    const receiverId = {{ other_user.id }};
    const listingId = {{ listing.id }};

    const chatBox = document.getElementById("chatBox");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");
    const onlineStatus = document.getElementById("onlineStatus");

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    scrollToBottom();

    socket.emit("join_chat", {
        room: room,
        user_id: currentUserId
    });

    chatForm.addEventListener("submit", function(e) {
        e.preventDefault();

        const content = messageInput.value.trim();
        if (!content) return;

        socket.emit("send_message", {
            room: room,
            sender_id: currentUserId,
            receiver_id: receiverId,
            listing_id: listingId,
            content: content
        });

        messageInput.value = "";
    });

    socket.on("receive_message", function(data) {
        const div = document.createElement("div");
        div.classList.add("chat-message");

        if (parseInt(data.sender_id) === currentUserId) {
            div.classList.add("sent");
        } else {
            div.classList.add("received");
        }

        div.innerHTML = `<p>${data.content}</p><span>${data.time}</span>`;
        chatBox.appendChild(div);
        scrollToBottom();
    });

    socket.on("online_users", function(users) {
        if (users.includes(String(receiverId))) {
            onlineStatus.textContent = "Online";
            onlineStatus.className = "online-dot";
        } else {
            onlineStatus.textContent = "Offline";
            onlineStatus.className = "offline-dot";
        }
    });
</script>

{% endblock %}
