{% extends "base.html" %}

{% block content %}

<section class="auth-section">
    <div class="auth-card">
        <h1>Create Your Account</h1>
        <p>Join CloudSentinel MarketLink to buy, sell, and grow your business.</p>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-row">
                 <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="text" name="phone" placeholder="08XXXXXXXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary full-width">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</section>

{% endblock %}
